<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="Amazon.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="amazon-logo border">
                <div class="logo"></div>
             </div>

            <div class="nav-address border">
                <p class="first">Deliver to</p>
            <div class="address-logo">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="second"> India</p>
                </div>
             </div>
             <div class="nav-scarch">
                <select class="scarch-select">
                    <option>All</option>
                </select>
                <input class="scarch-input" type="text" placeholder="Search Amazon">
                <div class="scarch-icon">
                    
                <i  class="fa-solid fa-magnifying-glass"></i>
                </div>
             </div>
             <div class="nav-sign border">
            <p><span>Hello, sign in</span></p>
            <p class="nav-second">Account & Lists</p>
        </div>
        <div class="nav-sign border">
            <p><span>Returns</span></p>
            <p class="nav-second">& Orders</p>
        </div>
        <div class="nav-cart border">
            <i class="fa-solid fa-cart-arrow-down"></i>
            Cart
        </div>

        </div>
        <div class="pannel">
            <div class="all-pannel">
                <i class="fa-solid fa-bars"></i>
                All
            </div>
            <div class="pannel-ops">
                <p>Today's Deals</p>
                <p>Customer Service</p>
                <p>Prime video</p>
                <P>Registry</P>
                <p>Gift Cards</p>
                <p>Sell</p>
            </div>
                
        <div>

        
    </header>

    
</body>
</html>
